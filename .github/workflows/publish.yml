name: publish

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    permissions:
      contents: write
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Validate updater key
        shell: pwsh
        env:
          COMFYUI_PATCHER_UPDATER_PUBKEY: ${{ secrets.COMFYUI_PATCHER_UPDATER_PUBKEY }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:COMFYUI_PATCHER_UPDATER_PUBKEY)) {
            throw "COMFYUI_PATCHER_UPDATER_PUBKEY must be set for release builds."
          }

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0.6.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMFYUI_PATCHER_UPDATER_PUBKEY: ${{ secrets.COMFYUI_PATCHER_UPDATER_PUBKEY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: ComfyUI Patcher v__VERSION__
          releaseDraft: false
          prerelease: false
